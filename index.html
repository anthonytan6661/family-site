<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan Autumn Adventure 2026 | 日本秋季之旅</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700&family=Outfit:wght@300;400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --autumn-red: #b91c1c;
            --autumn-orange: #f97316;
            --autumn-gold: #fbbf24;
            --deep-slate: #0f172a;
            --slate: #334155;
            --light-slate: #f8fafc;
            --white: #ffffff;
            --shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', 'Noto+Sans+SC', sans-serif;
            background-color: var(--light-slate);
            color: var(--deep-slate);
            line-height: 1.6;
            transition: all 0.3s ease;
        }

        /* Language Toggle */
        .lang-switch {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: var(--white);
            padding: 5px;
            border-radius: 30px;
            box-shadow: var(--shadow);
            display: flex;
            gap: 5px;
        }

        .lang-btn {
            border: none;
            background: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.875rem;
            transition: 0.3s;
        }

        .lang-btn.active {
            background: var(--autumn-red);
            color: var(--white);
        }

        /* Hero Section */
        header {
            height: 70vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            text-align: center;
            background: var(--deep-slate);
        }

        .hero-img {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.5;
            z-index: 1;
        }

        .hero-content { position: relative; z-index: 2; padding: 2rem; max-width: 900px; }
        h1 { font-family: 'Playfair Display', serif; font-size: 4rem; margin-bottom: 1rem; }
        .date-badge {
            display: inline-block;
            background: var(--autumn-orange);
            padding: 0.5rem 1.5rem;
            border-radius: 2rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        /* Content Sections */
        .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

        .trip-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: -5rem;
            position: relative;
            z-index: 10;
        }

        .summary-card {
            background: var(--white);
            padding: 1.5rem;
            border-radius: 1rem;
            box-shadow: var(--shadow);
            border-top: 5px solid var(--autumn-red);
        }

        /* Itinerary Nodes */
        .day-node {
            background: var(--white);
            border-radius: 1.5rem;
            margin-bottom: 3rem;
            overflow: hidden;
            box-shadow: var(--shadow);
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        @media (max-width: 850px) {
            .day-node { grid-template-columns: 1fr; }
            h1 { font-size: 2.5rem; }
        }

        .node-images {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 200px 200px;
            gap: 4px;
            background: #eee;
        }

        .node-images img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @media (max-width: 850px) {
            .day-node { grid-template-columns: 1fr; }
            .node-images { grid-template-rows: 150px 150px; }
            h1 { font-size: 2.5rem; }
        }
